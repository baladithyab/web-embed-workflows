name: static-passthrough

# Reusable workflow for embed.kind = "static-html" and friends.
#
# Uploads a directory tree of static files (HTML/JS/CSS/assets/...) into the
# project-embed assets bucket via the personal-site Worker's binding-proxy
# upload endpoint.
#
# Auth: GitHub Actions OIDC (primary). The job mints a short-lived ID token
# scoped to a fixed audience and presents it as the bearer; the Worker
# verifies the JWT signature against GitHub's JWKS and authorizes on
# `repository_owner`. No per-repo secrets needed.
#
# Fallback: if `secrets.PROJECT_EMBED_UPLOAD_TOKEN` is set on the calling
# repo, the workflow uses it instead. This keeps existing repos working
# while we roll OIDC out, and is also the right fit for any non-Actions
# uploader (manual scripts, etc.).
#
# Stored at:    r2://assets-r2/<slug>/<git-sha>/<path>
# Served from:  https://assets-r2.codeseys.io/<slug>/<git-sha>/<path>

on:
  workflow_call:
    inputs:
      manifest:
        description: 'Path to web.codeseys.json (relative to repo root)'
        required: false
        default: 'web.codeseys.json'
        type: string
      source-dir:
        description: 'Directory to upload (relative to repo root)'
        required: false
        default: '.'
        type: string
      upload-endpoint:
        description: 'Personal-site upload endpoint'
        required: false
        default: 'https://codeseys.io/api/embed-upload'
        type: string
      bucket-public-host:
        description: 'Public hostname serving the bucket (no trailing slash)'
        required: false
        default: 'https://assets-r2.codeseys.io'
        type: string
      oidc-audience:
        description: 'Audience the OIDC token will be minted for (must match the Worker)'
        required: false
        default: 'https://codeseys.io'
        type: string

permissions:
  contents: write
  pull-requests: write
  # Mint OIDC tokens. Required for the OIDC auth path.
  id-token: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Pull Git LFS files so build scripts can operate on real
          # content (e.g. ffmpeg-optimize a video) instead of LFS
          # pointer stubs. No-op for repos that don't use LFS.
          lfs: true

      - name: Read manifest
        id: manifest
        run: |
          set -euo pipefail
          MANIFEST_PATH="${{ inputs.manifest }}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "::error::manifest not found at $MANIFEST_PATH"
            exit 1
          fi
          SLUG=$(jq -r '.slug' "$MANIFEST_PATH")
          SCHEMA_VERSION=$(jq -r '.schemaVersion' "$MANIFEST_PATH")
          # static-passthrough handles three shapes:
          #  v1: { embed: { kind: ... } }
          #  v2 single-asset: { assets: [{ embed: {...} }] } (length == 1)
          #  v2 multi-asset:  { assets: [...] } (length > 1)
          # The actual embed kinds *inside* a v2 manifest can be anything that
          # this workflow can handle (essentially anything that compiles down
          # to "files served from R2"). The check below is permissive and lets
          # authors mix static-html / wasm / tex-pdf in one manifest.
          if [ "$SCHEMA_VERSION" = "1" ]; then
            KIND=$(jq -r '.embed.kind' "$MANIFEST_PATH")
            case "$KIND" in
              static-html|wasm-emscripten|wasm-rust|notebook-html|tex-pdf)
                echo "manifest schemaVersion=1, embed.kind=$KIND"
                ;;
              *)
                echo "::error::static-passthrough.yml does not handle embed.kind '$KIND'"
                exit 1
                ;;
            esac
          elif [ "$SCHEMA_VERSION" = "2" ]; then
            ASSET_COUNT=$(jq -r '.assets | length' "$MANIFEST_PATH")
            echo "manifest schemaVersion=2, assets=$ASSET_COUNT"
            # Reject any asset kind we can't upload via static passthrough.
            BAD_KIND=$(jq -r '.assets[].embed.kind' "$MANIFEST_PATH" | \
              grep -vE '^(static-html|wasm-emscripten|wasm-rust|notebook-html|tex-pdf|pglite-db)$' || true)
            if [ -n "$BAD_KIND" ]; then
              echo "::error::static-passthrough.yml does not handle asset embed.kind: $BAD_KIND"
              exit 1
            fi
          else
            echo "::error::unknown manifest schemaVersion: $SCHEMA_VERSION"
            exit 1
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "schema_version=$SCHEMA_VERSION" >> $GITHUB_OUTPUT

      - name: Install apt packages declared in manifest
        env:
          MANIFEST_PATH: ${{ inputs.manifest }}
        run: |
          set -euo pipefail
          # Pull `build.aptPackages` from the manifest if present.
          PKGS=$(jq -r '(.build.aptPackages // []) | join(" ")' "$MANIFEST_PATH")
          if [ -z "$PKGS" ]; then
            echo "No build.aptPackages in manifest; skipping apt install"
            exit 0
          fi
          echo "Installing: $PKGS"
          sudo apt-get update -qq
          # shellcheck disable=SC2086
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends $PKGS

      - name: Detect build.tools requested in manifest
        id: tools
        env:
          MANIFEST_PATH: ${{ inputs.manifest }}
        run: |
          set -euo pipefail
          # Returns 'true'/'false' for each known tool, used to gate the
          # tool-specific setup steps below. Avoids needing `if:` boolean
          # parsing of jq output, which is a footgun in Actions.
          TOOLS=$(jq -r '(.build.tools // []) | join(",")' "$MANIFEST_PATH")
          echo "Tools requested: ${TOOLS:-(none)}"
          if echo ",$TOOLS," | grep -q ",emsdk,"; then
            echo "want_emsdk=true" >> "$GITHUB_OUTPUT"
          else
            echo "want_emsdk=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Emscripten SDK
        if: steps.tools.outputs.want_emsdk == 'true'
        uses: mymindstorm/setup-emsdk@v14
        with:
          # Pin to a tested version. Bump deliberately when new features needed.
          version: '3.1.74'
          # Cache emsdk so subsequent runs reuse the toolchain (saves ~1.5min).
          actions-cache-folder: 'emsdk-cache'

      - name: Run build.script (if declared)
        env:
          MANIFEST_PATH: ${{ inputs.manifest }}
          SHORT_SHA: ${{ steps.manifest.outputs.short_sha }}
          SLUG: ${{ steps.manifest.outputs.slug }}
        run: |
          set -euo pipefail
          # `build.script` is an optional path to an executable that
          # transforms source → upload-ready artifacts in-place under
          # ${{ inputs.source-dir }}.
          BUILD_SCRIPT=$(jq -r '.build.script // empty' "$MANIFEST_PATH")
          if [ -z "$BUILD_SCRIPT" ]; then
            echo "No build.script in manifest; skipping pre-upload transform"
            exit 0
          fi
          if [ ! -f "$BUILD_SCRIPT" ]; then
            echo "::error::build.script declared as '$BUILD_SCRIPT' but file not found"
            exit 1
          fi
          if [ ! -x "$BUILD_SCRIPT" ]; then
            echo "Marking $BUILD_SCRIPT as executable"
            chmod +x "$BUILD_SCRIPT"
          fi
          echo "Running $BUILD_SCRIPT (source-dir=${{ inputs.source-dir }})"
          # The script gets the manifest values as env vars in case it needs them.
          export EMBED_SLUG="$SLUG"
          export EMBED_VERSION="$SHORT_SHA"
          export EMBED_SOURCE_DIR="${{ inputs.source-dir }}"
          time "./$BUILD_SCRIPT"
          echo "Build script complete; staged outputs ready for upload"

      - name: Stage source directory
        id: stage
        run: |
          set -euo pipefail
          STAGE_DIR="${RUNNER_TEMP}/stage"
          mkdir -p "$STAGE_DIR"
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='*.rar' \
            --exclude='*.zip' \
            --exclude='*.synctex.gz' \
            "${{ inputs.source-dir }}/" "$STAGE_DIR/"
          BYTES=$(du -sb "$STAGE_DIR" | awk '{print $1}')
          FILES=$(find "$STAGE_DIR" -type f | wc -l)
          echo "stage_dir=$STAGE_DIR" >> $GITHUB_OUTPUT
          echo "bytes=$BYTES" >> $GITHUB_OUTPUT
          echo "Staged $BYTES bytes ($FILES files) from ${{ inputs.source-dir }}"

      - name: Mint OIDC token (primary auth path)
        id: oidc
        env:
          AUDIENCE: ${{ inputs.oidc-audience }}
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::warning::OIDC env vars not present; skipping OIDC mint (falling back to static bearer)"
            echo "have_oidc=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Mint a JWT scoped to AUDIENCE. Endpoint is the runner-provided
          # token broker; the bearer is a one-time exchange token.
          # See: https://docs.github.com/en/actions/security-for-github-actions/security-hardening-your-deployments/about-security-hardening-with-openid-connect
          TOKEN_RESP=$(curl -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            -H "Accept: application/json" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}")
          ID_TOKEN=$(echo "$TOKEN_RESP" | jq -r '.value // empty')
          if [ -z "$ID_TOKEN" ] || [ "$ID_TOKEN" = "null" ]; then
            echo "::error::OIDC mint returned empty token. Response: $TOKEN_RESP"
            exit 1
          fi
          # Don't echo the token; just confirm shape (3 segments) and length.
          SEGS=$(echo "$ID_TOKEN" | tr '.' '\n' | wc -l)
          LEN=${#ID_TOKEN}
          if [ "$SEGS" -ne 3 ] || [ "$LEN" -lt 100 ]; then
            echo "::error::OIDC token shape wrong (segments=$SEGS, length=$LEN)"
            exit 1
          fi
          echo "have_oidc=true" >> "$GITHUB_OUTPUT"
          # Pass token to subsequent steps via env (masked from logs by convention).
          echo "::add-mask::$ID_TOKEN"
          # Write to a step env file so the next step picks it up.
          {
            echo "OIDC_ID_TOKEN<<__OIDC_EOF__"
            echo "$ID_TOKEN"
            echo "__OIDC_EOF__"
          } >> "$GITHUB_ENV"
          echo "OIDC token minted: ${SEGS} segments, ${LEN} bytes"

      - name: Upload via Worker binding-proxy
        env:
          UPLOAD_ENDPOINT: ${{ inputs.upload-endpoint }}
          UPLOAD_TOKEN: ${{ secrets.PROJECT_EMBED_UPLOAD_TOKEN }}
          HAVE_OIDC: ${{ steps.oidc.outputs.have_oidc }}
          SLUG: ${{ steps.manifest.outputs.slug }}
          VERSION: ${{ steps.manifest.outputs.short_sha }}
          STAGE: ${{ steps.stage.outputs.stage_dir }}
        run: |
          set -euo pipefail
          # Pick the auth bearer: OIDC (if minted) wins; static fallback otherwise.
          if [ "${HAVE_OIDC:-false}" = "true" ] && [ -n "${OIDC_ID_TOKEN:-}" ]; then
            BEARER="$OIDC_ID_TOKEN"
            AUTH_MODE="oidc"
          elif [ -n "${UPLOAD_TOKEN:-}" ]; then
            BEARER="$UPLOAD_TOKEN"
            AUTH_MODE="bearer"
          else
            echo "::error::No auth available — neither OIDC nor PROJECT_EMBED_UPLOAD_TOKEN."
            echo "::error::For OIDC: caller workflow must include 'permissions: id-token: write'."
            echo "::error::For static fallback: set PROJECT_EMBED_UPLOAD_TOKEN as a repo secret."
            exit 1
          fi
          echo "Authenticating via: ${AUTH_MODE}"

          # Pre-flight health check
          health=$(curl -s -o /dev/null -w '%{http_code}' "$UPLOAD_ENDPOINT")
          if [ "$health" != "200" ]; then
            echo "::error::Upload endpoint health check failed: HTTP $health"
            exit 1
          fi
          echo "Uploading to ${UPLOAD_ENDPOINT}?slug=${SLUG}&version=${VERSION}&path=<path>"
          # Upload each file individually. Cap per-file at 90 MiB on the server
          # side; this loop just streams them in sequence.
          FAIL=0
          while IFS= read -r -d '' f; do
            rel="${f#${STAGE}/}"
            # URL-encode the path: convert spaces to %20 (most other chars in our
            # file set are already URL-safe).
            enc_rel=$(jq -nr --arg p "$rel" '$p|@uri')
            url="${UPLOAD_ENDPOINT}?slug=${SLUG}&version=${VERSION}&path=${enc_rel}"
            code=$(curl -sS -X PUT "$url" \
              -H "Authorization: Bearer ${BEARER}" \
              --data-binary "@${f}" \
              -o /tmp/upload-resp.json \
              -w '%{http_code}')
            if [ "$code" != "200" ]; then
              echo "::warning::Upload failed for $rel (HTTP $code): $(cat /tmp/upload-resp.json 2>/dev/null || true)"
              FAIL=1
            else
              echo "  ✓ $rel"
            fi
          done < <(find "${STAGE}" -type f -print0)
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more uploads failed"
            exit 1
          fi

      - name: Update manifest in repo
        env:
          BUCKET_HOST: ${{ inputs.bucket-public-host }}
          SLUG: ${{ steps.manifest.outputs.slug }}
          SHA: ${{ steps.manifest.outputs.short_sha }}
          BYTES: ${{ steps.stage.outputs.bytes }}
          MANIFEST_PATH: ${{ inputs.manifest }}
        run: |
          set -euo pipefail
          NEW_URL="${BUCKET_HOST}/${SLUG}/${SHA}/"
          jq \
            --arg url "$NEW_URL" \
            --arg version "$SHA" \
            --argjson bytes "$BYTES" \
            '.delivery.url = $url | .delivery.version = $version | .delivery.sizeBytes = $bytes' \
            "$MANIFEST_PATH" > "${MANIFEST_PATH}.new"
          mv "${MANIFEST_PATH}.new" "$MANIFEST_PATH"

      - name: Commit manifest bump back to repo
        env:
          MANIFEST_PATH: ${{ inputs.manifest }}
          SHA: ${{ steps.manifest.outputs.short_sha }}
        run: |
          set -euo pipefail
          if git diff --quiet "$MANIFEST_PATH"; then
            echo "manifest unchanged; nothing to commit"
            exit 0
          fi
          git config user.name 'web-embed-bot'
          git config user.email 'web-embed-bot@users.noreply.github.com'
          git add "$MANIFEST_PATH"
          git commit -m "chore(embed): bump delivery to ${SHA} [skip ci]"
          # Race-resilient push: if remote moved (e.g. another commit
          # landed during this run), rebase + retry up to 3 times.
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              echo "Pushed manifest bump on attempt $attempt"
              exit 0
            fi
            echo "Push failed; pulling --rebase + retrying (attempt $attempt/3)"
            git pull --rebase --autostash origin "$(git rev-parse --abbrev-ref HEAD)" || {
              echo "::error::rebase failed; manifest bump abandoned"
              exit 1
            }
          done
          echo "::error::Push failed after 3 attempts; manifest bump not committed"
          exit 1
